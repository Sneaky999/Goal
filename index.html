<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>My Goal System</title>
<style>

  :root {
    --navy: #1F3A5F;
    --navy-dark: #16293F;
    --steel: #3B6FA0;
    --copper: #C6601E;
    --green: #3C8C6B;
    --purple: #7A5195;
    --red: #B5482A;
    --ink: #1A1A1A;
    --grey: #6B6B6B;
    --light-grey: #9a9a9a;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #E5E1D8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  .wrap { max-width: 480px; margin: 0 auto; padding-bottom: 48px; }

  .header {
    background: linear-gradient(135deg, var(--navy), var(--navy-dark));
    color: white;
    padding: 28px 20px 20px;
  }
  .header .eyebrow {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.6); font-weight: 600; margin-bottom: 6px;
  }
  .header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.01em; }
  .header p { margin: 6px 0 0; color: rgba(255,255,255,0.7); font-size: 14px; }
  .sync-status { font-size: 11px; margin-top: 10px; color: rgba(255,255,255,0.55); }
  .sync-status.ok::before { content: "● "; color: #6FCF97; }
  .sync-status.err::before { content: "● "; color: #E2725B; }
  .sync-status.pending::before { content: "● "; color: #E0C04C; }

  .tabs {
    display: flex; gap: 6px; padding: 12px 14px; overflow-x: auto;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: white; color: var(--grey); font-size: 13px; font-weight: 600;
    white-space: nowrap; cursor: pointer;
  }
  .tab-btn.active { background: var(--navy); color: white; border-color: var(--navy); }

  .content { padding: 14px; }

  .day-meta { display: flex; justify-content: space-between; align-items: baseline; padding: 0 4px 6px; }
  .day-meta .date { font-size: 13px; color: var(--grey); }
  .day-meta .count { font-size: 13px; font-weight: 700; color: #333; }
  .reset-btn { font-size: 12px; color: var(--light-grey); background: none; border: none; cursor: pointer; padding: 4px; }

  .progress-bar { width: 100%; height: 6px; background: #EFEBE3; border-radius: 999px; overflow: hidden; margin: 4px 0 14px; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width 0.3s; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .card-head {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    cursor: pointer; width: 100%; background: none; border: none; text-align: left;
  }
  .card-icon {
    width: 34px; height: 34px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px;
  }
  .card-title-wrap { flex: 1; }
  .card-title { font-weight: 700; font-size: 15px; color: #111; }
  .card-subtitle { font-size: 12.5px; color: var(--grey); margin-top: 1px; }
  .chevron { color: var(--light-grey); font-size: 14px; transition: transform 0.2s; }
  .card-body { padding: 0 10px 10px; }
  .card-body.collapsed { display: none; }

  .row {
    width: 100%; display: flex; align-items: flex-start; gap: 12px;
    text-align: left; background: none; border: none; cursor: pointer;
    padding: 10px 10px; border-radius: 10px;
  }
  .row:hover { background: rgba(0,0,0,0.03); }
  .row.readonly { cursor: default; }
  .row.readonly:hover { background: none; }
  .checkbox {
    margin-top: 2px; flex-shrink: 0; width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid #D8D2C4; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: white; font-weight: 700;
  }
  .checkbox.checked { border-color: transparent; }
  .row-text { flex: 1; }
  .row-label { font-size: 15px; font-weight: 600; line-height: 1.35; color: #222; }
  .row-label.checked { color: #B5B0A4; text-decoration: line-through; }
  .row-detail { font-size: 13px; color: var(--grey); margin-top: 2px; }
  .row-detail.checked { color: #C9C4B8; }

  .custom-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 10px; }
  .custom-input {
    width: 100%; border: none; border-bottom: 1px solid var(--border);
    font-size: 15px; font-weight: 600; padding: 4px 0; background: transparent;
    font-family: inherit; color: #222;
  }
  .custom-input:focus { outline: none; border-bottom-color: var(--navy); }
  .custom-input.checked { color: #B5B0A4; text-decoration: line-through; }
  .custom-sub { font-size: 13px; color: var(--grey); margin-top: 4px; }

  .note-italic { font-size: 12.5px; color: var(--grey); font-style: italic; padding: 0 12px 8px; }
  .radar-note { font-size: 12px; color: var(--light-grey); font-style: italic; padding: 6px 12px 2px; }

  .focus-line { font-size: 13px; font-weight: 600; color: #333; padding: 0 4px 6px; }

  .footer-note { text-align: center; font-size: 11px; color: var(--light-grey); padding-top: 10px; }
  .bottom-notes { font-size: 12px; color: var(--light-grey); font-style: italic; padding: 12px 8px; line-height: 1.6; }

  .loading-screen {
    display: flex; align-items: center; justify-content: center; height: 60vh;
    color: var(--grey); font-size: 14px;
  }

  /* Calendar / History view */
  .history-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 12px;
    border-radius: 999px; border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85);
    font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 12px;
  }
  .history-btn:hover { background: rgba(255,255,255,0.15); }

  .calendar-overlay {
    position: fixed; inset: 0; background: rgba(20,20,18,0.45);
    display: flex; align-items: flex-end; justify-content: center; z-index: 100;
  }
  .calendar-sheet {
    background: var(--bg); width: 100%; max-width: 480px; border-radius: 22px 22px 0 0;
    padding: 18px 18px 28px; max-height: 85vh; overflow-y: auto;
    animation: slideUp 0.22s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .calendar-header h2 { font-size: 17px; margin: 0; color: #1a1a1a; }
  .calendar-nav { display: flex; gap: 4px; }
  .calendar-nav button {
    width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
    background: white; color: var(--navy); font-size: 14px; cursor: pointer;
  }
  .calendar-close {
    width: 30px; height: 30px; border-radius: 8px; border: none;
    background: #EFEBE3; color: var(--grey); font-size: 15px; cursor: pointer;
  }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--light-grey); font-weight: 700; padding-bottom: 4px; }
  .cal-day {
    aspect-ratio: 1; border-radius: 11px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer; border: 1px solid transparent;
    position: relative; background: white; font-size: 13px; color: #333;
  }
  .cal-day.empty { visibility: hidden; cursor: default; }
  .cal-day.today { border-color: var(--navy); font-weight: 700; }
  .cal-day .dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 2px; }
  .cal-day.has-data { font-weight: 600; }
  .cal-day:hover { background: #F0EDE5; }
  .cal-legend { display: flex; gap: 14px; margin-top: 14px; font-size: 11.5px; color: var(--grey); justify-content: center; }
  .cal-legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  .history-day-view { padding-top: 4px; }
  .history-back {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--navy);
    font-weight: 600; background: none; border: none; cursor: pointer; padding: 6px 0 12px;
  }
  .history-date-title { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
  .history-sub { font-size: 13px; color: var(--grey); margin-bottom: 14px; }
  .readonly-note {
    font-size: 12px; color: var(--light-grey); font-style: italic;
    text-align: center; padding: 10px 0 4px;
  }

  /* Roadmap Timeline */
  .roadmap-spotlight {
    background: linear-gradient(135deg, #1F3A5F, #16293F);
    border-radius: 16px; padding: 16px 18px; color: white; margin-bottom: 18px;
  }
  .spotlight-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.6); font-weight: 700; margin-bottom: 6px; }
  .spotlight-subject { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .spotlight-focus { font-size: 13.5px; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
  .spotlight-days { font-size: 12px; color: rgba(255,255,255,0.6); }
  .spotlight-why { font-size: 13px; color: rgba(255,255,255,0.85); font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.15); }

  .roadmap-timeline { position: relative; }
  .roadmap-row { display: flex; gap: 12px; position: relative; }
  .roadmap-line {
    display: flex; flex-direction: column; align-items: center; position: relative; flex-shrink: 0; width: 34px;
  }
  .roadmap-line::before {
    content: ""; position: absolute; top: 34px; bottom: -12px; width: 2px; background: var(--border); left: 50%; transform: translateX(-50%);
  }
  .roadmap-line.last::before { display: none; }
  .roadmap-node {
    width: 34px; height: 34px; border-radius: 50%; background: #D8D2C4; color: white;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
    z-index: 1; flex-shrink: 0;
  }
  .roadmap-node.current { box-shadow: 0 0 0 4px rgba(31,58,95,0.15); }
  .roadmap-node.past-incomplete { opacity: 0.55; }
  .roadmap-card {
    flex: 1; text-align: left; background: white; border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 14px; cursor: pointer; width: 100%;
  }
  .roadmap-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .roadmap-card-title { font-size: 14.5px; font-weight: 700; color: #1a1a1a; }
  .roadmap-card-sub { font-size: 12px; color: var(--grey); margin-top: 2px; }
  .roadmap-detail { padding: 0 0 14px 4px; }
  .roadmap-subject-item { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; }
  .roadmap-subject-title { font-size: 13.5px; font-weight: 700; color: #222; display: flex; justify-content: space-between; }
  .roadmap-subject-count { font-size: 12px; color: var(--grey); font-weight: 600; }
  .roadmap-subject-focus { font-size: 12.5px; color: var(--grey); margin-top: 2px; }
  .roadmap-jump-btn {
    width: 100%; padding: 10px; border-radius: 10px; border: none; background: var(--navy);
    color: white; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 4px;
  }

  .group-header {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700;
    color: var(--light-grey); padding: 8px 4px 4px; margin-top: 4px;
  }

  /* Pathways */
  .roadmap-switcher { display: flex; gap: 6px; margin-bottom: 16px; background: #EFEBE3; border-radius: 12px; padding: 4px; }
  .roadmap-switch-btn {
    flex: 1; padding: 9px; border-radius: 9px; border: none; background: none;
    color: var(--grey); font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .roadmap-switch-btn.active { background: white; color: var(--navy); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

  .pathway-intro { font-size: 13px; color: var(--grey); padding: 0 2px 14px; line-height: 1.5; }
  .pathway-pick-list { display: flex; flex-direction: column; gap: 10px; }
  .pathway-pick-card {
    text-align: left; background: white; border: 1px solid var(--border); border-radius: 16px;
    padding: 14px 16px; cursor: pointer; width: 100%;
  }
  .pathway-pick-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .pathway-pick-icon {
    width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .pathway-pick-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }
  .pathway-pick-sub { font-size: 12px; color: var(--grey); margin-top: 1px; }
  .pathway-pick-blurb { font-size: 12.5px; color: var(--grey); line-height: 1.4; }

  /* Subject transition popup */
  .transition-overlay {
    position: fixed; inset: 0; background: rgba(20,20,18,0.6);
    display: flex; align-items: center; justify-content: center; z-index: 200;
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .transition-card {
    background: white; width: 90%; max-width: 420px; border-radius: 24px;
    padding: 32px 28px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: scaleIn 0.35s ease-out;
  }
  @keyframes scaleIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .transition-emoji { font-size: 56px; margin-bottom: 16px; }
  .transition-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
  .transition-subject { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .transition-budget { font-size: 14px; color: var(--grey); margin-bottom: 16px; }
  .transition-preview { font-size: 14px; color: #333; line-height: 1.6; margin-bottom: 12px; text-align: left; }
  .transition-why { font-size: 13px; color: var(--grey); font-style: italic; line-height: 1.5; margin-bottom: 24px; text-align: left; padding: 12px; background: #F8F6F2; border-radius: 12px; }
  .transition-btn {
    width: 100%; padding: 14px; border-radius: 14px; border: none;
    background: var(--navy); color: white; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: transform 0.15s;
  }
  .transition-btn:hover { transform: scale(1.02); }
  .transition-btn:active { transform: scale(0.98); }

  /* Warning banner */
  .warning-banner {
    display: flex; align-items: flex-start; gap: 10px; background: #FFF4E5; border: 1px solid #F0D9A8;
    color: #6b4d12; padding: 12px 14px; margin: 0 14px 0; border-radius: 12px; font-size: 13px; line-height: 1.4;
    position: relative; top: 10px;
  }
  .warning-icon { flex-shrink: 0; }
  .warning-text { flex: 1; }
  .warning-dismiss { background: none; border: none; color: #6b4d12; font-size: 13px; cursor: pointer; flex-shrink: 0; }

  .caught-up-message {
    font-size: 14px; color: #2f6b4a; background: #E4F2EA; border-radius: 12px;
    padding: 16px; text-align: center; font-weight: 600;
  }

  .weekend-note {
    font-size: 12.5px; color: #1F3A5F; background: #E8EEF6; border-radius: 10px;
    padding: 8px 12px; margin-bottom: 12px; text-align: center; font-weight: 600;
  }

  .past-subject-note {
    font-size: 12.5px; color: #8a6d2f; background: #FBF2DC; border-radius: 10px;
    padding: 8px 12px; margin-bottom: 10px;
  }

  .cleanup-group { border: 1px dashed var(--border); border-radius: 12px; padding: 8px; margin: 4px 0; }
  .cleanup-group-title { font-size: 13px; font-weight: 700; color: var(--grey); padding: 4px 8px; }

</style>
</head>

// ---------------- Shared constants & state ----------------
const ICONS = { sunrise: "🌅", sun: "☀️", target: "🎯", moon: "🌙", calendar: "📅", map: "🧭" };
let collapsedCards = {};

// ============================================================
// SEQUENTIAL SUBJECT TRACKING
// Each subject tracks its own "days elapsed" from first touch.
// No calendar-month dependency. No week layer.
// ============================================================

// State keys:
// - "currentSubjectIndex": which subject is currently active (0-23)
// - "subjectStart_<id>": timestamp (ms) when subject was first touched
// - "subjectDay_<id>": manually overridden day count (if user wants to adjust)
// - "subjectCompleted_<id>": boolean — subject fully completed
// - "transitionShown_<id>": boolean — transition popup already shown for this subject
// - Daily checkboxes: "<dateKey>_d_<taskId>"
// - Subject items: "<subjectId>_<itemId>"

function getCurrentSubjectIndex() {
  return state.currentSubjectIndex !== undefined ? state.currentSubjectIndex : 0;
}

function getSubjectDayCount(subjectId) {
  // Days elapsed since first touch, or 0 if never touched
  const startKey = `subjectStart_${subjectId}`;
  const start = state[startKey];
  if (!start) return 0;
  const msPerDay = 1000 * 60 * 60 * 24;
  const elapsed = Math.floor((Date.now() - start) / msPerDay) + 1;
  return Math.max(1, elapsed);
}

function getSubjectDaysElapsed(subjectId) {
  return getSubjectDayCount(subjectId);
}

function isSubjectComplete(subjectId) {
  return !!state[`subjectCompleted_${subjectId}`];
}

function isSubjectPast(subjectId) {
  const idx = SUBJECTS.findIndex(s => s.id === subjectId);
  return idx < getCurrentSubjectIndex();
}

function isSubjectCurrent(subjectId) {
  const idx = SUBJECTS.findIndex(s => s.id === subjectId);
  return idx === getCurrentSubjectIndex();
}

function getSubjectProgress(subject) {
  const done = subject.items.filter(i => state[`${subject.id}_${i.id}`]).length;
  return { done, total: subject.items.length, pct: subject.items.length ? Math.round((done / subject.items.length) * 100) : 0 };
}

function isSubjectFullyChecked(subject) {
  return subject.items.every(i => state[`${subject.id}_${i.id}`]);
}

// Advance to next subject when current is fully completed
function checkSubjectAdvancement() {
  const currentIdx = getCurrentSubjectIndex();
  const currentSubject = SUBJECTS[currentIdx];
  if (!currentSubject) return;

  // If all items checked, mark complete and advance
  if (isSubjectFullyChecked(currentSubject) && !isSubjectComplete(currentSubject.id)) {
    state[`subjectCompleted_${currentSubject.id}`] = true;

    // Advance to next subject if there is one
    if (currentIdx < SUBJECTS.length - 1) {
      const nextSubject = SUBJECTS[currentIdx + 1];
      state.currentSubjectIndex = currentIdx + 1;
      // Set start time for next subject (if not already set)
      if (!state[`subjectStart_${nextSubject.id}`]) {
        state[`subjectStart_${nextSubject.id}`] = Date.now();
      }
      // Show transition popup
      state[`transitionShown_${nextSubject.id}`] = false;
    }
    saveState();
    render();
  }
}

// Get today's specific sub-item from current subject (auto-advancing)
function getTodaysSubItem(subject) {
  const dayCount = getSubjectDayCount(subject.id);
  // Map day count to an item index (cycling through items if subject spans more days than items)
  const itemIdx = Math.min(dayCount - 1, subject.items.length - 1);
  return subject.items[itemIdx];
}

// Get pending sub-items from current subject (for weekend catch-up)
function getPendingSubItems(subject) {
  return subject.items.filter(i => !state[`${subject.id}_${i.id}`]);
}

// ---------------- Date helpers ----------------
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}
function dateKeyFor(year, month, day) {
  return `${year}-${month + 1}-${day}`;
}

// ---------------- Firebase sync ----------------
function setSyncStatus(s) {
  syncStatus = s;
  const el = document.getElementById("sync-status");
  if (el) {
    el.className = "sync-status " + s;
    el.textContent = s === "ok" ? "Synced" : s === "err" ? "Sync error — check connection" : "Syncing…";
  }
}
function saveState() {
  setSyncStatus("pending");
  set(stateRef, state).then(() => setSyncStatus("ok")).catch((e) => {
    console.error("Firebase save error", e);
    setSyncStatus("err");
  });
}

function toggle(key) {
  state[key] = !state[key];
  render();
  saveState();
  // Check if subject advancement should happen
  setTimeout(checkSubjectAdvancement, 100);
}

function toggleWithReadonlyGuard(key, isReadonly) {
  if (isReadonly) {
    // Past subject — fully read-only, no editing at all
    activeWarning = { text: "This subject is complete — it's read-only now. Focus on the current subject!" };
    render();
    return;
  }
  toggle(key);
}

function setCustomText(key, value) {
  state[key] = value;
  saveState();
}

onValue(stateRef, (snapshot) => {
  const remote = snapshot.val();
  if (remote) state = remote;
  setSyncStatus("ok");

  // Initialize current subject if not set
  if (state.currentSubjectIndex === undefined) {
    state.currentSubjectIndex = 0;
    const firstSubject = SUBJECTS[0];
    if (!state[`subjectStart_${firstSubject.id}`]) {
      state[`subjectStart_${firstSubject.id}`] = Date.now();
    }
    saveState();
  }

  // Check for transition popup
  const currentIdx = getCurrentSubjectIndex();
  const currentSubject = SUBJECTS[currentIdx];
  if (currentSubject && !state[`transitionShown_${currentSubject.id}`]) {
    showTransitionPopup = true;
    transitionSubject = currentSubject;
  }

  render();
}, (error) => {
  console.error("Firebase read error", error);
  setSyncStatus("err");
  render();
});

// ---------------- Shared render helpers ----------------
function checkboxHtml(id, checked, color) {
  return `<span class="checkbox ${checked ? "checked" : ""}" style="${checked ? `background:${color || "#1F3A5F"}` : ""}">${checked ? "✓" : ""}</span>`;
}
function rowHtml(id, label, detail, checked, opts = {}) {
  const color = opts.color || "#1F3A5F";
  const readonlyAttr = opts.readonly ? ` data-readonly="1"` : "";
  return `
    <button class="row ${opts.readonly ? "readonly" : ""}" data-toggle="${id}"${readonlyAttr}>
      ${checkboxHtml(id, checked, color)}
      <span class="row-text">
        <div class="row-label ${checked ? "checked" : ""}" style="${opts.bold ? "font-weight:700;" : ""}">${label}</div>
        ${detail ? `<div class="row-detail ${checked ? "checked" : ""}">${detail}</div>` : ""}
      </span>
    </button>`;
}
function readonlyRowHtml(label, detail, checked, opts = {}) {
  const color = opts.color || "#1F3A5F";
  return `
    <div class="row readonly">
      ${checkboxHtml("", checked, color)}
      <span class="row-text">
        <div class="row-label ${checked ? "checked" : ""}" style="${opts.bold ? "font-weight:700;" : ""}">${label}</div>
        ${detail ? `<div class="row-detail ${checked ? "checked" : ""}">${detail}</div>` : ""}
      </span>
    </div>`;
}
function cardHtml(id, icon, title, subtitle, accent, bodyHtml, collapsed) {
  return `
    <div class="card">
      <button class="card-head" data-cardtoggle="${id}">
        <span class="card-icon" style="background:${accent}">${icon}</span>
        <span class="card-title-wrap">

          ${subtitle ? `<div class="card-subtitle">${subtitle}</div>` : ""}
        </span>
        <span class="chevron">${collapsed ? "▸" : "▾"}</span>

      <div class="card-body ${collapsed ? "collapsed" : ""}" id="body-${id}">${bodyHtml}</div>
    </div>`;
}

function getDailyIds(subject) {
  const dow = new Date().getDay();
  const isEvenDay = (new Date().getDate() % 2 === 0);
  const ids = [
    `${dKey}_d_hydrate`, `${dKey}_d_glance`, `${dKey}_d_stretch`, `${dKey}_d_eat1`,
    `${dKey}_d_brush`, `${dKey}_d_bed`,
    `${dKey}_d_breath`, `${dKey}_d_affirm`, `${dKey}_d_visual`,
    `${dKey}_d_eggs`, `${dKey}_d_hydrate2`, `${dKey}_d_lunch`, `${dKey}_d_break`,
    `${dKey}_d_h_chess`, `${dKey}_d_h_jp`, `${dKey}_d_h_box`, `${dKey}_d_h_yt`,
    `${dKey}_d_tomorrow`, `${dKey}_d_screens`, `${dKey}_d_lights`,
  ];
  if (isEvenDay) ids.push(`${dKey}_d_bath`);
  // Add subject-specific items
  if (subject) {
    subject.items.forEach(item => ids.push(`${dKey}_d_subj_${item.id}`));
  }
  ids.push(`${dKey}_d_custom`);
  return ids;
}

function progressForDate(dk, subject) {
  // For calendar view, use current subject's structure
  const ids = getDailyIds(subject);
  const done = ids.filter(id => state[id]).length;
  return { done, total: ids.length, pct: Math.round((done / ids.length) * 100) };
}

  const switcherHtml = `
    <div class="roadmap-switcher">
      <button class="roadmap-switch-btn ${roadmapView === "timeline" ? "active" : ""}" data-roadmap-view="timeline">📅 Timeline</button>
      <button class="roadmap-switch-btn ${roadmapView === "pathways" ? "active" : ""}" data-roadmap-view="pathways">🧭 Pathways</button>
    </div>`;

  if (roadmapView === "pathways") {
    return switcherHtml + renderPathways();
  }
  return switcherHtml + renderRoadmapTimeline();
}

function renderRoadmapTimeline() {
  const currentIdx = getCurrentSubjectIndex();
  const currentSubject = SUBJECTS[currentIdx];

  // Spotlight: current active subject
  let spotlightHtml = "";
  if (currentSubject) {
    const dayCount = getSubjectDayCount(currentSubject.id);
    const budget = currentSubject.budget || "∞";
    const { done, total } = getSubjectProgress(currentSubject);
    spotlightHtml = `
      <div class="roadmap-spotlight">
        <div class="spotlight-label">🎯 Right now</div>
        <div class="spotlight-subject">${currentSubject.title}</div>
        <div class="spotlight-focus">${currentSubject.preview.substring(0, 100)}${currentSubject.preview.length > 100 ? "..." : ""}</div>
        <div class="spotlight-days">Day ${dayCount}${currentSubject.budget ? ` / ${budget} days` : ""} • ${done}/${total} items done</div>
        <div class="spotlight-why">${currentSubject.why}</div>
      </div>`;
  }

  let timelineHtml = `<div class="roadmap-timeline">`;
  let currentGroup = "";

  SUBJECTS.forEach((subject, idx) => {
    // Group header
    if (subject.group !== currentGroup) {
      currentGroup = subject.group;
      timelineHtml += `<div class="group-header">${currentGroup}</div>`;
    }

    const isPast = idx < currentIdx;
    const isCurrent = idx === currentIdx;
    const complete = isSubjectComplete(subject.id);
    const isExpanded = expandedSubjectId === subject.id;
    const { done, total } = getSubjectProgress(subject);
    const dayCount = getSubjectDayCount(subject.id);
    const budgetText = subject.budget ? `${dayCount}/${subject.budget}` : "ongoing";

    let nodeClass = "roadmap-node";
    if (complete) nodeClass += " complete";
    else if (isCurrent) nodeClass += " current";
    else if (isPast) nodeClass += " past-incomplete";

    timelineHtml += `
      <div class="roadmap-row">
        <div class="roadmap-line ${idx === 0 ? "first" : ""} ${idx === SUBJECTS.length - 1 ? "last" : ""}">
          <div class="${nodeClass}" style="background:${complete ? "#3C8C6B" : subject.color}">
            ${complete ? "✓" : subject.n}
          </div>
        </div>
        <button class="roadmap-card" data-roadmap-subject="${subject.id}">
          <div class="roadmap-card-top">
            <div>
              <div class="roadmap-card-title">${subject.title}</div>
              <div class="roadmap-card-sub">${done}/${total} items • ${budgetText} days ${isPast && !complete ? "· past, read-only" : isCurrent ? "· in progress now" : !isPast ? "· upcoming" : ""}</div>
            </div>
            <span class="chevron">${isExpanded ? "▾" : "▸"}</span>
          </div>
          ${!isExpanded ? `<div class="progress-bar" style="margin:8px 0 0;"><div class="progress-fill" style="width:${total ? Math.round((done/total)*100) : 0}%;background:${subject.color}"></div></div>` : ""}
        </button>
        ${isExpanded ? renderRoadmapSubjectDetail(subject) : ""}
      </div>`;
  });
  timelineHtml += `</div>`;

  return spotlightHtml + timelineHtml;
}

function renderRoadmapSubjectDetail(subject) {
  const isPast = isSubjectPast(subject.id);
  const isCurrent = isSubjectCurrent(subject.id);
  const readonly = isPast && isSubjectComplete(subject.id);

  let itemsHtml = `
    <div class="note-italic">${subject.why}</div>
    <div class="note-italic">${subject.preview}</div>`;

  if (readonly) {
    itemsHtml += `<div class="past-subject-note">📋 This subject is complete — read-only view.</div>`;
  }

  subject.items.forEach(item => {
    const checked = !!state[`${subject.id}_${item.id}`];
    if (readonly) {
      itemsHtml += readonlyRowHtml(item.text, null, checked, { color: subject.color });
    } else {
      itemsHtml += rowHtml(`${subject.id}_${item.id}`, item.text, null, checked, { color: subject.color, readonly: isPast && !isCurrent });
    }
  });

  return `<div class="roadmap-detail">${itemsHtml}
    <button class="roadmap-jump-btn" data-jump-subject="${subject.id}">Open ${subject.title} in Daily →</button>
  </div>`;
}

// ---------------- Pathways (UNCHANGED from original) ----------------
function pathwayStageProgress(stage) {
  const done = stage.items.filter(i => state[i.id]).length;
  return { done, total: stage.items.length };
}
function pathwayProgress(pathway) {
  const allItems = pathway.stages.flatMap(s => s.items);
  const done = allItems.filter(i => state[i.id]).length;
  return { done, total: allItems.length };
}

function renderPathways() {
  if (!activePathwayId) {
    let cards = PATHWAYS.map(p => {
      const { done, total } = pathwayProgress(p);
      const pct = total ? Math.round((done / total) * 100) : 0;
      return `
        <button class="pathway-pick-card" data-pick-pathway="${p.id}">
          <div class="pathway-pick-top">
            <span class="pathway-pick-icon" style="background:${p.color}">${p.icon}</span>
            <div>
              <div class="pathway-pick-title">${p.title}</div>
              <div class="pathway-pick-sub">${total ? `${done}/${total} items` : "Not built yet"}</div>
            </div>
          </div>
          <div class="pathway-pick-blurb">${p.blurb}</div>
          ${total ? `<div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" style="width:${pct}%;background:${p.color}"></div></div>` : ""}
        </button>`;
    }).join("");
    return `<div class="pathway-intro">Pick a pathway — these track topic progress, not schedule. No time pressure, just what's learned and what's next.</div>
      <div class="pathway-pick-list">${cards}</div>`;
  }

  const pathway = PATHWAYS.find(p => p.id === activePathwayId);
  if (!pathway.stages.length) {
    return `
      <button class="history-back" id="pathway-back-btn">← Back to pathways</button>
      <div class="locked-message">
        <div class="locked-icon">${pathway.icon}</div>
        <div class="locked-title">${pathway.title} — coming soon</div>
        <div class="locked-sub">${pathway.blurb}</div>
      </div>`;
  }

  const { done, total } = pathwayProgress(pathway);
  const pct = Math.round((done / total) * 100);

  let html = `<button class="history-back" id="pathway-back-btn">← Back to pathways</button>`;
  html += `<div class="focus-line">${pathway.icon} ${pathway.title} — ${done}/${total} items</div>`;
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pathway.color}"></div></div>`;

  pathway.stages.forEach((stage, idx) => {
    const { done: sDone, total: sTotal } = pathwayStageProgress(stage);
    const stageComplete = sDone === sTotal;
    let itemsHtml = `<div class="note-italic">${stage.note}</div>`;
    stage.items.forEach(item => {
      itemsHtml += rowHtml(item.id, item.text, null, !!state[item.id], { color: pathway.color });
    });
    html += cardHtml(
      `pathway-${stage.id}`,
      stageComplete ? "✓" : `${idx + 1}`,
      stage.title,
      `${sDone}/${sTotal} done`,
      stageComplete ? "#3C8C6B" : pathway.color,
      itemsHtml,
      collapsedCards[`pathway-${stage.id}`] !== false
    );
  });

  return html;
}


// ============================================================
// YEARLY VIEW
// ============================================================
function renderYearly() {
  const done = YEARLY_GOALS.filter(g => state[g.id]).length;
  const pct = Math.round((done / YEARLY_GOALS.length) * 100);

  let html = `<div class="focus-line">The big picture — review monthly</div>`;
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:#1F3A5F"></div></div>`;

  const byArea = {};
  YEARLY_GOALS.forEach(g => { (byArea[g.area] = byArea[g.area] || []).push(g); });

  Object.entries(byArea).forEach(([area, goals]) => {
    const areaDone = goals.filter(g => state[g.id]).length;
    let goalsHtml = "";
    goals.forEach(g => {
      goalsHtml += rowHtml(g.id, g.text, g.window, !!state[g.id], { color: AREA_COLORS[area] });
    });
    html += cardHtml(`area-${area}`, ICONS.target, area, `${areaDone}/${goals.length} done`, AREA_COLORS[area], goalsHtml, collapsedCards[`area-${area}`]);
  });

  html += `<div class="bottom-notes">
    <p>Chess, Japanese, and boxing are ongoing habits — the win is consistency, not a finish line.</p>
    <p>Game dev comes after job-readiness goals (web dev, OWASP, resume) — the faster path to being self-dependent.</p>
  </div>`;

  return html;
}

// ============================================================
// CALENDAR / HISTORY
// ============================================================
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["S","M","T","W","T","F","S"];

function renderCalendarOverlay() {
  const currentSubject = SUBJECTS[getCurrentSubjectIndex()];
  const year = calendarViewDate.getFullYear();
  const cmonth = calendarViewDate.getMonth();
  const firstDay = new Date(year, cmonth, 1).getDay();
  const daysInMonth = new Date(year, cmonth + 1, 0).getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === year && today.getMonth() === cmonth;

  let cells = "";
  for (let i = 0; i < firstDay; i++) cells += `<div class="cal-day empty"></div>`;

  for (let day = 1; day <= daysInMonth; day++) {
    const dk = dateKeyFor(year, cmonth, day);
    const { done, total } = progressForDate(dk, currentSubject);
    const isToday = isCurrentMonth && today.getDate() === day;
    const isFuture = new Date(year, cmonth, day) > today;
    let dotColor = "";
    if (!isFuture && done > 0) dotColor = done === total ? "#3C8C6B" : "#E0C04C";
    cells += `
      <div class="cal-day ${isToday ? "today" : ""} ${done > 0 ? "has-data" : ""}" ${isFuture ? "" : `data-history-date="${dk}"`} style="${isFuture ? "opacity:0.35;cursor:default;" : ""}">
        ${day}${dotColor ? `<span class="dot" style="background:${dotColor}"></span>` : ""}
      </div>`;
  }
  const dowHtml = DOW.map(d => `<div class="cal-dow">${d}</div>`).join("");

  return `
    <div class="calendar-overlay" id="calendar-overlay">
      <div class="calendar-sheet">
        <div class="calendar-header">
          <div class="calendar-nav"><button id="cal-prev">‹</button><button id="cal-next">›</button></div>
          <h2>${MONTH_NAMES[cmonth]} ${year}</h2>
          <button class="calendar-close" id="cal-close">✕</button>
        </div>
        <div class="calendar-grid">${dowHtml}${cells}</div>
        <div class="cal-legend">
          <span><span class="legend-dot" style="background:#3C8C6B"></span> Full day</span>
          <span><span class="legend-dot" style="background:#E0C04C"></span> Partial</span>
          <span><span class="legend-dot" style="background:#D8D2C4"></span> No activity</span>
        </div>
      </div>
    </div>`;
}

function renderHistoryDay() {
  const currentSubject = SUBJECTS[getCurrentSubjectIndex()];
  const dk = historyDate.key;
  const { done, total, pct } = progressForDate(dk, currentSubject);
  const dateObj = new Date(historyDate.year, historyDate.month, historyDate.day);
  const dateStr = dateObj.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  const customText = state[`${dk}_d_custom_text`] || "";
  const customChecked = !!state[`${dk}_d_custom`];

  let html = `
    <div class="history-day-view">
      <button class="history-back" id="history-back-btn">← Back to today</button>
      <div class="history-date-title">${dateStr}</div>
      <div class="history-sub">${done} / ${total} completed that day</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${currentSubject ? currentSubject.color : "#1F3A5F"}"></div></div>`;

  // Early Morning
  html += cardHtml("h-morning", ICONS.sunrise, "Early Morning", null, "#3B6FA0", `
    ${readonlyRowHtml("Hydrate — glass of water right away", null, !!state[`${dk}_d_hydrate`])}
    ${readonlyRowHtml("Quick glance at today's task list", null, !!state[`${dk}_d_glance`])}
    ${readonlyRowHtml("Light stretch or movement", null, !!state[`${dk}_d_stretch`])}
    ${readonlyRowHtml("Eat something before heading out", null, !!state[`${dk}_d_eat1`])}
    ${readonlyRowHtml("Brush", null, !!state[`${dk}_d_brush`])}
    ${readonlyRowHtml("Make bed", null, !!state[`${dk}_d_bed`])}
    ${readonlyRowHtml("Deep breathing", null, !!state[`${dk}_d_breath`])}
    ${readonlyRowHtml("Affirmations", null, !!state[`${dk}_d_affirm`])}
    ${readonlyRowHtml("Visualization", null, !!state[`${dk}_d_visual`])}
  `, false);

  // During the Day
  html += cardHtml("h-midday", ICONS.sun, "During the Day", null, "#C6601E", `
    ${readonlyRowHtml("Eat two eggs", null, !!state[`${dk}_d_eggs`])}
    ${readonlyRowHtml("Hydrate (midday top-up)", null, !!state[`${dk}_d_hydrate2`])}
    ${readonlyRowHtml("Have lunch", null, !!state[`${dk}_d_lunch`])}
    ${readonlyRowHtml("One short break outside or away from screens", null, !!state[`${dk}_d_break`])}
  `, false);

  // Top 3
  let top3body = "";
  if (currentSubject) {
    currentSubject.items.forEach(item => {
      top3body += readonlyRowHtml(item.text, null, !!state[`${dk}_d_subj_${item.id}`], { color: currentSubject.color });
    });
  }
  if (customText) top3body += readonlyRowHtml(customText, "Open slot task", customChecked, { bold: true, color: currentSubject ? currentSubject.color : "#1F3A5F" });
  html += cardHtml("h-top3", ICONS.target, "Today's Focus", null, currentSubject ? currentSubject.color : "#1F3A5F", top3body, false);

  // Habits
  html += cardHtml("h-habits", ICONS.moon, "Ongoing Habits", null, "#3C8C6B", `
    ${readonlyRowHtml("Chess", "a game or a review", !!state[`${dk}_d_h_chess`], { color: "#3C8C6B" })}
    ${readonlyRowHtml("Japanese", "10–15 min", !!state[`${dk}_d_h_jp`], { color: "#3C8C6B" })}
    ${readonlyRowHtml("Boxing", "if it's a training day", !!state[`${dk}_d_h_box`], { color: "#3C8C6B" })}
    ${readonlyRowHtml("YouTube video upload", "no fixed schedule", !!state[`${dk}_d_h_yt`], { color: "#3C8C6B" })}
  `, false);

  // Night
  html += cardHtml("h-night", ICONS.moon, "Night", null, "#7A5195", `
    ${readonlyRowHtml("Write tomorrow's top priority before stopping work", null, !!state[`${dk}_d_tomorrow`])}
    ${readonlyRowHtml("Screens off 20–30 min before bed", null, !!state[`${dk}_d_screens`])}
    ${readonlyRowHtml("Lights out by 10–11pm", null, !!state[`${dk}_d_lights`])}
  `, false);

  html += `<div class="readonly-note">This is a read-only look back — past days can't be edited.</div></div>`;
  return html;
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  const currentIdx = getCurrentSubjectIndex();
  const currentSubject = SUBJECTS[currentIdx];

  const TABS = [
    { id: "daily", label: "Daily", icon: "☀️" },
    { id: "yearly", label: "Yearly", icon: "🎯" },
    { id: "roadmap", label: "Roadmap", icon: "🧭" },
  ];

  let tabsHtml = TABS.map(t => `
    <button class="tab-btn ${tab === t.id ? "active" : ""}" data-tab="${t.id}">${t.icon} ${t.label}</button>
  `).join("");

  let contentHtml = "";
  if (tab === "daily") contentHtml = historyDate ? renderHistoryDay() : renderDaily();
  else if (tab === "yearly") contentHtml = renderYearly();
  else if (tab === "roadmap") contentHtml = renderRoadmap();

  const warningHtml = activeWarning ? `
    <div class="warning-banner" id="warning-banner">
      <span class="warning-icon">⚠️</span>
      <span class="warning-text">${activeWarning.text}</span>
      <button class="warning-dismiss" id="warning-dismiss">✕</button>
    </div>` : "";

  const transitionHtml = renderTransitionPopup();

  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <div class="eyebrow">Sequential Goal System</div>
      <h1>My Goal System</h1>
      <p>One subject at a time. Master it, then move on.</p>
      <div class="sync-status ${syncStatus}" id="sync-status">${syncStatus === "ok" ? "Synced" : syncStatus === "err" ? "Sync error — check connection" : "Syncing…"}</div>
    </div>
    ${warningHtml}
    <div class="tabs">${tabsHtml}</div>
    <div class="content">${contentHtml}</div>
    <div class="footer-note">Changes sync automatically across your devices</div>
    ${calendarOpen ? renderCalendarOverlay() : ""}
    ${transitionHtml}
  `;
  attachListeners();
}

function attachListeners() {
  // Toggle checkboxes
  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.preventDefault();
      const key = el.getAttribute("data-toggle");
      const isReadonly = el.getAttribute("data-readonly") === "1";
      if (isReadonly) {
        toggleWithReadonlyGuard(key, true);
      } else {
        toggle(key);
      }
    });
  });

  // Card collapse
  document.querySelectorAll("[data-cardtoggle]").forEach(el => {
    el.addEventListener("click", () => {
      collapsedCards[el.getAttribute("data-cardtoggle")] = !collapsedCards[el.getAttribute("data-cardtoggle")];
      render();
    });
  });

  // Tab switching
  document.querySelectorAll("[data-tab]").forEach(el => {
    el.addEventListener("click", () => { tab = el.getAttribute("data-tab"); render(); });
  });

  // Roadmap subject expand
  document.querySelectorAll("[data-roadmap-subject]").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.getAttribute("data-roadmap-subject");
      expandedSubjectId = expandedSubjectId === id ? null : id;
      render();
    });
  });

  // Jump to subject from roadmap
  document.querySelectorAll("[data-jump-subject]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = el.getAttribute("data-jump-subject");
      const idx = SUBJECTS.findIndex(s => s.id === id);
      if (idx >= 0) {
        state.currentSubjectIndex = idx;
        saveState();
        tab = "daily";
        render();
      }
    });
  });

  // Roadmap view switcher
  document.querySelectorAll("[data-roadmap-view]").forEach(el => {
    el.addEventListener("click", () => {
      roadmapView = el.getAttribute("data-roadmap-view");
      render();
    });
  });

  // Pathway picker
  document.querySelectorAll("[data-pick-pathway]").forEach(el => {
    el.addEventListener("click", () => {
      activePathwayId = el.getAttribute("data-pick-pathway");
      render();
    });
  });

  const pathwayBackBtn = document.getElementById("pathway-back-btn");
  if (pathwayBackBtn) {
    pathwayBackBtn.addEventListener("click", () => { activePathwayId = null; render(); });
  }

  // Reset day
  const resetBtn = document.getElementById("reset-day-btn");
  if (resetBtn) {
    resetBtn.addEventListener("click", () => {
      const currentSubject = SUBJECTS[getCurrentSubjectIndex()];
      const ids = getDailyIds(currentSubject);
      ids.forEach(id => delete state[id]);
      delete state[`${dKey}_d_custom_text`];
      render();
      saveState();
    });
  }

  // Custom task input
  const customInput = document.getElementById("custom-task-input");
  if (customInput) {
    customInput.addEventListener("input", (e) => setCustomText(`${dKey}_d_custom_text`, e.target.value));
  }

  // Calendar
  const openCalBtn = document.getElementById("open-calendar-btn");
  if (openCalBtn) {
    openCalBtn.addEventListener("click", () => { calendarViewDate = new Date(); calendarOpen = true; render(); });
  }
  const calClose = document.getElementById("cal-close");
  if (calClose) calClose.addEventListener("click", () => { calendarOpen = false; render(); });
  const calOverlay = document.getElementById("calendar-overlay");
  if (calOverlay) {
    calOverlay.addEventListener("click", (e) => { if (e.target.id === "calendar-overlay") { calendarOpen = false; render(); } });
  }
  const calPrev = document.getElementById("cal-prev");
  if (calPrev) calPrev.addEventListener("click", () => { calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth() - 1, 1); render(); });
  const calNext = document.getElementById("cal-next");
  if (calNext) calNext.addEventListener("click", () => { calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth() + 1, 1); render(); });

  // History date selection
  document.querySelectorAll("[data-history-date]").forEach(el => {
    el.addEventListener("click", () => {
      const dk = el.getAttribute("data-history-date");
      const [y, m, d] = dk.split("-").map(Number);
      historyDate = (dk === dKey) ? null : { year: y, month: m - 1, day: d, key: dk };
      calendarOpen = false;
      render();
    });
  });

  const historyBackBtn = document.getElementById("history-back-btn");
  if (historyBackBtn) historyBackBtn.addEventListener("click", () => { historyDate = null; render(); });

  // Warning dismiss
  const warningDismiss = document.getElementById("warning-dismiss");
  if (warningDismiss) warningDismiss.addEventListener("click", () => { activeWarning = null; render(); });

  // Transition popup continue
  const transitionContinue = document.getElementById("transition-continue");
  if (transitionContinue) {
    transitionContinue.addEventListener("click", () => {
      if (transitionSubject) {
        state[`transitionShown_${transitionSubject.id}`] = true;
        saveState();
      }
      showTransitionPopup = false;
      transitionSubject = null;
      render();
    });
  }
  const transitionOverlay = document.getElementById("transition-overlay");
  if (transitionOverlay) {
    transitionOverlay.addEventListener("click", (e) => {
      if (e.target.id === "transition-overlay") {
        // Require explicit button click, but clicking outside also dismisses
        if (transitionSubject) {
          state[`transitionShown_${transitionSubject.id}`] = true;
          saveState();
        }
        showTransitionPopup = false;
        transitionSubject = null;
        render();
      }
    });
  }
}

// Initial render while waiting for Firebase
render();

</script>
