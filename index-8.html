<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>My Goal System</title>
<style>

  :root {
    --navy: #1F3A5F;
    --navy-dark: #16293F;
    --steel: #3B6FA0;
    --copper: #C6601E;
    --green: #3C8C6B;
    --purple: #7A5195;
    --red: #B5482A;
    --ink: #1A1A1A;
    --grey: #6B6B6B;
    --light-grey: #9a9a9a;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #E5E1D8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  .wrap { max-width: 480px; margin: 0 auto; padding-bottom: 48px; }

  .header {
    background: linear-gradient(135deg, var(--navy), var(--navy-dark));
    color: white;
    padding: 28px 20px 20px;
  }
  .header .eyebrow {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.6); font-weight: 600; margin-bottom: 6px;
  }
  .header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.01em; }
  .header p { margin: 6px 0 0; color: rgba(255,255,255,0.7); font-size: 14px; }
  .sync-status { font-size: 11px; margin-top: 10px; color: rgba(255,255,255,0.55); }
  .sync-status.ok::before { content: "● "; color: #6FCF97; }
  .sync-status.err::before { content: "● "; color: #E2725B; }
  .sync-status.pending::before { content: "● "; color: #E0C04C; }

  .tabs {
    display: flex; gap: 6px; padding: 12px 14px; overflow-x: auto;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: white; color: var(--grey); font-size: 13px; font-weight: 600;
    white-space: nowrap; cursor: pointer;
  }
  .tab-btn.active { background: var(--navy); color: white; border-color: var(--navy); }

  .content { padding: 14px; }

  .day-meta { display: flex; justify-content: space-between; align-items: baseline; padding: 0 4px 6px; }
  .day-meta .date { font-size: 13px; color: var(--grey); }
  .day-meta .count { font-size: 13px; font-weight: 700; color: #333; }
  .reset-btn { font-size: 12px; color: var(--light-grey); background: none; border: none; cursor: pointer; padding: 4px; }

  .progress-bar { width: 100%; height: 6px; background: #EFEBE3; border-radius: 999px; overflow: hidden; margin: 4px 0 14px; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width 0.3s; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .card-head {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    cursor: pointer; width: 100%; background: none; border: none; text-align: left;
  }
  .card-icon {
    width: 34px; height: 34px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px;
  }
  .card-title-wrap { flex: 1; }
  .card-title { font-weight: 700; font-size: 15px; color: #111; }
  .card-subtitle { font-size: 12.5px; color: var(--grey); margin-top: 1px; }
  .chevron { color: var(--light-grey); font-size: 14px; transition: transform 0.2s; }
  .card-body { padding: 0 10px 10px; }
  .card-body.collapsed { display: none; }

  .row {
    width: 100%; display: flex; align-items: flex-start; gap: 12px;
    text-align: left; background: none; border: none; cursor: pointer;
    padding: 10px 10px; border-radius: 10px;
  }
  .row:hover { background: rgba(0,0,0,0.03); }
  .checkbox {
    margin-top: 2px; flex-shrink: 0; width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid #D8D2C4; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: white; font-weight: 700;
  }
  .checkbox.checked { border-color: transparent; }
  .row-text { flex: 1; }
  .row-label { font-size: 15px; font-weight: 600; line-height: 1.35; color: #222; }
  .row-label.checked { color: #B5B0A4; text-decoration: line-through; }
  .row-detail { font-size: 13px; color: var(--grey); margin-top: 2px; }
  .row-detail.checked { color: #C9C4B8; }

  .custom-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 10px; }
  .custom-input {
    width: 100%; border: none; border-bottom: 1px solid var(--border);
    font-size: 15px; font-weight: 600; padding: 4px 0; background: transparent;
    font-family: inherit; color: #222;
  }
  .custom-input:focus { outline: none; border-bottom-color: var(--navy); }
  .custom-input.checked { color: #B5B0A4; text-decoration: line-through; }
  .custom-sub { font-size: 13px; color: var(--grey); margin-top: 4px; }

  .note-italic { font-size: 12.5px; color: var(--grey); font-style: italic; padding: 0 12px 8px; }
  .radar-note { font-size: 12px; color: var(--light-grey); font-style: italic; padding: 6px 12px 2px; }

  .week-pills { display: flex; gap: 6px; margin-bottom: 10px; }
  .week-pill {
    flex: 1; padding: 8px; border-radius: 10px; border: 1px solid var(--border);
    background: white; color: var(--grey); font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .week-pill.active { background: var(--navy); color: white; border-color: var(--navy); }

  .footer-note { text-align: center; font-size: 11px; color: var(--light-grey); padding-top: 10px; }
  .focus-line { font-size: 13px; font-weight: 600; color: #333; padding: 0 4px 6px; }

  .bottom-notes { font-size: 12px; color: var(--light-grey); font-style: italic; padding: 12px 8px; line-height: 1.6; }

  .loading-screen {
    display: flex; align-items: center; justify-content: center; height: 60vh;
    color: var(--grey); font-size: 14px;
  }

  /* Calendar / History view */
  .history-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 12px;
    border-radius: 999px; border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85);
    font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 12px;
  }
  .history-btn:hover { background: rgba(255,255,255,0.15); }

  .calendar-overlay {
    position: fixed; inset: 0; background: rgba(20,20,18,0.45);
    display: flex; align-items: flex-end; justify-content: center; z-index: 100;
  }
  .calendar-sheet {
    background: var(--bg); width: 100%; max-width: 480px; border-radius: 22px 22px 0 0;
    padding: 18px 18px 28px; max-height: 85vh; overflow-y: auto;
    animation: slideUp 0.22s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .calendar-header h2 { font-size: 17px; margin: 0; color: #1a1a1a; }
  .calendar-nav { display: flex; gap: 4px; }
  .calendar-nav button {
    width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
    background: white; color: var(--navy); font-size: 14px; cursor: pointer;
  }
  .calendar-close {
    width: 30px; height: 30px; border-radius: 8px; border: none;
    background: #EFEBE3; color: var(--grey); font-size: 15px; cursor: pointer;

  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--light-grey); font-weight: 700; padding-bottom: 4px; }
  .cal-day {
    aspect-ratio: 1; border-radius: 11px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer; border: 1px solid transparent;
    position: relative; background: white; font-size: 13px; color: #333;

  .cal-day.empty { visibility: hidden; cursor: default; }
  .cal-day.today { border-color: var(--navy); font-weight: 700; }
  .cal-day .dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 2px; }
  .cal-day.has-data { font-weight: 600; }
  .cal-day:hover { background: #F0EDE5; }
  .cal-legend { display: flex; gap: 14px; margin-top: 14px; font-size: 11.5px; color: var(--grey); justify-content: center; }
  .cal-legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  .history-day-view { padding-top: 4px; }
  .history-back {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--navy);
    font-weight: 600; background: none; border: none; cursor: pointer; padding: 6px 0 12px;
  }
  .history-date-title { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
  .history-sub { font-size: 13px; color: var(--grey); margin-bottom: 14px; }
  .readonly-note {
    font-size: 12px; color: var(--light-grey); font-style: italic;
    text-align: center; padding: 10px 0 4px;
  }
  .row.readonly { cursor: default; }
  .row.readonly:hover { background: none; }

  /* Roadmap */
  .roadmap-spotlight {
    background: linear-gradient(135deg, #1F3A5F, #16293F);
    border-radius: 16px; padding: 16px 18px; color: white; margin-bottom: 18px;
  }
  .spotlight-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.6); font-weight: 700; margin-bottom: 6px; }
  .spotlight-month { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .spotlight-focus { font-size: 13.5px; color: rgba(255,255,255,0.8); }

  .roadmap-timeline { position: relative; }
  .roadmap-row { display: flex; gap: 12px; position: relative; }
  .roadmap-line {
    display: flex; flex-direction: column; align-items: center; position: relative; flex-shrink: 0; width: 34px;
  }
  .roadmap-line::before {
    content: ""; position: absolute; top: 34px; bottom: -12px; width: 2px; background: var(--border); left: 50%; transform: translateX(-50%);
  }
  .roadmap-line.last::before { display: none; }
  .roadmap-node {
    width: 34px; height: 34px; border-radius: 50%; background: #D8D2C4; color: white;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
    z-index: 1; flex-shrink: 0;

  .roadmap-node.current { box-shadow: 0 0 0 4px rgba(31,58,95,0.15); }
  .roadmap-node.past-incomplete { opacity: 0.55; }
  .roadmap-node.upcoming { opacity: 0.45; }
  .roadmap-group-header {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--light-grey);
    font-weight: 700; margin: 18px 4px 8px; padding-left: 4px;
  }
  .roadmap-group-header:first-child { margin-top: 0; }
  .roadmap-card {
    flex: 1; text-align: left; background: white; border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 14px; cursor: pointer; width: 100%;
  }
  .roadmap-card-locked { background: #F3F1EC; cursor: default; opacity: 0.7; }
  .roadmap-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .roadmap-card-title { font-size: 14.5px; font-weight: 700; color: #1a1a1a; }
  .roadmap-card-sub { font-size: 12px; color: var(--grey); margin-top: 2px; }

  .roadmap-detail { padding: 0 0 14px 4px; }
  .roadmap-week { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; }
  .roadmap-week-title { font-size: 13.5px; font-weight: 700; color: #222; display: flex; justify-content: space-between; }
  .roadmap-week-count { font-size: 12px; color: var(--grey); font-weight: 600; }
  .roadmap-week-focus { font-size: 12.5px; color: var(--grey); margin-top: 2px; }
  .roadmap-jump-btn {
    width: 100%; padding: 10px; border-radius: 10px; border: none; background: var(--navy);
    color: white; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 4px;
  }

  .locked-message { text-align: center; padding: 60px 20px; }
  .locked-icon { font-size: 36px; margin-bottom: 10px; }
  .locked-title { font-size: 17px; font-weight: 700; color: #333; margin-bottom: 6px; }
  .locked-sub { font-size: 13.5px; color: var(--grey); }

  /* Pathways */
  .roadmap-switcher { display: flex; gap: 6px; margin-bottom: 16px; background: #EFEBE3; border-radius: 12px; padding: 4px; }
  .roadmap-switch-btn {
    flex: 1; padding: 9px; border-radius: 9px; border: none; background: none;
    color: var(--grey); font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .roadmap-switch-btn.active { background: white; color: var(--navy); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

  .pathway-intro { font-size: 13px; color: var(--grey); padding: 0 2px 14px; line-height: 1.5; }
  .pathway-pick-list { display: flex; flex-direction: column; gap: 10px; }
  .pathway-pick-card {
    text-align: left; background: white; border: 1px solid var(--border); border-radius: 16px;
    padding: 14px 16px; cursor: pointer; width: 100%;
  }
  .pathway-pick-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .pathway-pick-icon {
    width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .pathway-pick-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }
  .pathway-pick-sub { font-size: 12px; color: var(--grey); margin-top: 1px; }
  .pathway-pick-blurb { font-size: 12.5px; color: var(--grey); line-height: 1.4; }

  /* Calendar-driven period navigation */
  .period-nav { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 10px; }
  .period-nav-btn {
    width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
    background: white; color: var(--navy); font-size: 15px; cursor: pointer;

  .period-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .period-nav-label { font-size: 15px; font-weight: 700; color: #1a1a1a; min-width: 90px; text-align: center; }

  .past-period-note {
    font-size: 12.5px; color: #8a6d2f; background: #FBF2DC; border-radius: 10px;

  .pre-practice-note {
    font-size: 12.5px; color: #2f6b4a; background: #E4F2EA; border-radius: 10px;

  .weekend-note {
    font-size: 12.5px; color: #1F3A5F; background: #E8EEF6; border-radius: 10px;

  .caught-up-message {

  .week-pill-past { opacity: 0.65; }

  /* Tick-only past rows */
  .row-pastlock { position: relative; }
  .pastlock-tag {
    font-size: 10px; color: var(--light-grey); text-transform: uppercase; letter-spacing: 0.06em;

  /* Warning banner */
  .warning-banner {
    display: flex; align-items: flex-start; gap: 10px; background: #FFF4E5; border: 1px solid #F0D9A8;
    color: #6b4d12; padding: 12px 14px; margin: 0 14px 0; border-radius: 12px; font-size: 13px; line-height: 1.4;
    position: relative; top: 10px;
  }
  .warning-icon { flex-shrink: 0; }
  .warning-text { flex: 1; }
  .warning-dismiss { background: none; border: none; color: #6b4d12; font-size: 13px; cursor: pointer; flex-shrink: 0; }



  /* Subject header card (replaces month info table) */
  .subject-header-card {
    border-radius: 18px; padding: 22px 20px; color: white; margin-bottom: 12px; text-align: center;
  }
  .subject-header-icon { font-size: 36px; margin-bottom: 6px; }
  .subject-header-title { font-size: 20px; font-weight: 700; }
  .subject-header-group { font-size: 12.5px; opacity: 0.8; margin-top: 2px; }
  .subject-header-days { font-size: 13px; opacity: 0.9; margin-top: 8px; font-weight: 600; }

  /* Cleanup & Mindset subgroup (nested inside Early Morning card) */
  .subgroup { margin: 4px 6px 2px; border: 1px solid var(--border); border-radius: 12px; background: #FAF8F3; }

  .transition-overlay {

  @keyframes popIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .transition-emoji { font-size: 56px; margin-bottom: 12px; }
  .transition-label {

  }
  .transition-title { font-size: 24px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
  .transition-budget { font-size: 13px; color: var(--grey); font-weight: 600; margin-bottom: 14px; }
  .transition-blurb { font-size: 14px; color: #444; line-height: 1.5; margin-bottom: 14px; }
  .transition-why {
    font-size: 13px; color: #2f5a4a; background: #E4F2EA; border-radius: 12px;
    padding: 12px 14px; line-height: 1.5; text-align: left; margin-bottom: 20px;
  }
  .transition-why-label { font-weight: 700; }
  .transition-project {
    font-size: 13px; color: #6b4d12; background: #FFF4E5; border-radius: 12px;

  .review-banner {
    background: linear-gradient(135deg, #7A5195, #5e3d72); color: white; border-radius: 16px;
    padding: 18px 20px; margin-bottom: 14px;
  }
  .review-banner-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .review-banner-sub { font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.4; }
  .transition-continue {
    width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--navy);
    color: white; font-size: 15px; font-weight: 700; cursor: pointer;
  }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const stateRef = ref(db, "checklistState");

// ============================================================
// DATA: Months 1-6, each with theme, ongoing-habit overrides, goals, and weeks
// ============================================================

// ============================================================
// SEQUENTIAL SUBJECTS — replaces the old calendar-month MONTHS array.
// One subject active at a time. Each has a day-budget (target/guide,
// not a hard deadline) and a set of milestones (~5 days/milestone,
// min 1) that auto-advance daily as you check them off.
// ============================================================

// One subject active at a time. Each has a day-budget (target/guide,
// not a hard deadline) and ONE MILESTONE PER DAY — sized so a single
// day's work is genuinely doable in a day, not a multi-day chunk
// pretending to be "today's task". Quantum Computing is the deliberate
// exception (paced slower, 15-30 min/day, so its hours don't map 1:1
// to its days — see its own milestone list below).
// ============================================================

function milestoneCount(days) {
  return Math.max(1, days);
}

// Builds an array of milestone objects, ONE PER DAY of the budget.
function buildMilestones(subjectId, days, labelFn) {
  const count = milestoneCount(days);
  const milestones = [];
  for (let i = 0; i < count; i++) {
    milestones.push({
      id: `${subjectId}_ms${i + 1}`,
      label: labelFn ? labelFn(i, count) : `Day ${i + 1} of ${count}`,
    });
  }
  return milestones;
}

// Default label generator: "Day 1 of 24", etc.
function defaultLabels(i, count) {
  return `Day ${i + 1} of ${count}`;
}

// For hour-based courses where 1 day = 1 hour exactly: "Hour 1 of 24", etc.
function hourLabels(i, count) {
  return `Hour ${i + 1} of ${count}`;
}

const SUBJECTS = [
  // ---------------- FOUNDATIONS ----------------

// ---------------- Subject progress helpers ----------------
function isSubjectComplete(subject) {
  const milestonesDone = subject.milestones.every(m => !!state[m.id]);
  const projectDone = subject.project ? !!state[subject.project.id] : true;
  return milestonesDone && projectDone;
}
function subjectProgress(subject) {
  const done = subject.milestones.filter(m => !!state[m.id]).length;
  return { done, total: subject.milestones.length };
}

// The current active subject is the first one not yet complete.
function getCurrentSubjectIndex() {
  for (let i = 0; i < SUBJECTS.length; i++) {
    if (!isSubjectComplete(SUBJECTS[i])) return i;
  }
  return SUBJECTS.length - 1; // everything done — stay on the last one
}

// ============================================================
// PERIODIC REVIEW — every 5th completed subject, redo a mini version of one
// randomly-picked project from that batch of 5 before continuing. Blocks
// advancement the same way an end-of-subject project does.
// ============================================================
const REVIEW_INTERVAL = 5;

function completedSubjectsCount() {
  return SUBJECTS.filter(s => isSubjectComplete(s)).length;
}

// Which "review batch" are we potentially waiting on right now? Batch 1 = subjects
// 1-5, batch 2 = subjects 6-10, etc. Returns null if not yet at a batch boundary.
function pendingReviewBatch() {
  const done = completedSubjectsCount();
  if (done === 0 || done % REVIEW_INTERVAL !== 0) return null;
  const batchNumber = done / REVIEW_INTERVAL;
  const reviewKey = `review_done_batch_${batchNumber}`;
  if (state[reviewKey]) return null; // this batch's review already completed
  return batchNumber;
}

// The 5 subjects belonging to a given batch number, in completion order.
function subjectsInBatch(batchNumber) {
  const completed = SUBJECTS.filter(s => isSubjectComplete(s));
  const start = (batchNumber - 1) * REVIEW_INTERVAL;
  return completed.slice(start, start + REVIEW_INTERVAL);
}

// Randomly (but persistently — stored once chosen) picks one project-having
// subject from a batch to be the review task. Returns null if none in that
// batch have a project at all (rare, but possible).
function getReviewSubjectForBatch(batchNumber) {
  const pickKey = `review_pick_batch_${batchNumber}`;
  if (state[pickKey]) {
    return SUBJECTS.find(s => s.id === state[pickKey]) || null;
  }
  const candidates = subjectsInBatch(batchNumber).filter(s => s.project);
  if (!candidates.length) return null;
  const chosen = candidates[Math.floor(Math.random() * candidates.length)];
  state[pickKey] = chosen.id;
  saveState();
  return chosen;
}

function reviewTaskId(batchNumber) {
  return `review_task_batch_${batchNumber}`;
}

// Days elapsed on the current subject: tracked via a stored "started" timestamp,
// set the first time a subject becomes active. Falls back to 0 if not yet set.
function daysElapsedForSubject(subject) {
  const startKey = `subject_started_${subject.id}`;
  const startedAt = state[startKey];
  if (!startedAt) return 0;
  const startDate = new Date(startedAt);
  const now = new Date();
  const diffMs = now.setHours(0,0,0,0) - new Date(startDate).setHours(0,0,0,0);
  return Math.max(0, Math.round(diffMs / 86400000));
}

// Call this whenever rendering the current subject, to make sure its start date
// gets recorded the first time it becomes active (idempotent — only sets once).
function ensureSubjectStarted(subject) {
  const startKey = `subject_started_${subject.id}`;
  if (!state[startKey]) {
    state[startKey] = new Date().toISOString();
    saveState();
  }
}

// Today's milestone for a subject: the first one that's either unchecked, OR was
// checked but not yet "released" into a new day. Each milestone, once checked,
// records the date it was checked (state[`${m.id}_checkedOn`]). The NEXT milestone
// only becomes "today's" once the most recently checked one's date is in the past
// relative to today — i.e. a new calendar day has genuinely started since checking it.
function todaysMilestone(subject) {
  for (let i = 0; i < subject.milestones.length; i++) {
    const m = subject.milestones[i];
    if (!state[m.id]) return m; // not checked yet — this is today's (and remains so until checked)
    // This one IS checked — see if enough time (a new day) has passed to release the next one.
    const checkedOn = state[`${m.id}_checkedOn`];
    const checkedIsToday = checkedOn === todayKey();
    if (checkedIsToday) return m; // checked today — stay here, don't reveal the next one yet
    // checked on an earlier day — move on and check the next milestone in the loop
  }
  return null; // every milestone checked and released — subject fully complete
}

// Kept for places that need "is everything in this subject done" without the
// day-gating (e.g. subject completion / advancement logic) — unaffected by gating.
function nextPendingMilestone(subject) {
  return subject.milestones.find(m => !state[m.id]) || null;
}

function checkboxHtml(id, checked, color) {
  return `<span class="checkbox ${checked ? "checked" : ""}" style="${checked ? `background:${color || "#1F3A5F"}` : ""}">${checked ? "✓" : ""}</span>`;

}

function cardHtml(id, icon, title, subtitle, accent, bodyHtml, collapsed) {

// ---------------- App state ----------------
let state = {};
let tab = "daily";
let syncStatus = "pending";
let calendarOpen = false;
let calendarViewDate = new Date();
let historyDate = null;

let transitionPopup = null; // { subject } — shown full-screen when a new subject becomes current

// CRITICAL: nothing may save to Firebase until the real data has loaded at least
// once. Without this guard, the very first synchronous render() call (which runs
// before Firebase responds) can trigger a save of the still-empty initial state,
// overwriting real data with nothing on every page refresh/close — this was a
// real, confirmed bug. saveState() refuses to run until this flips to true.
let hasLoadedFromFirebase = false;

const dKey = todayKey();

// ---------------- Firebase sync ----------------
function setSyncStatus(s) {
  syncStatus = s;
  const el = document.getElementById("sync-status");
  if (el) {
    el.className = "sync-status " + s;
    el.textContent = s === "ok" ? "Synced" : s === "err" ? "Sync error — check connection" : "Syncing…";
  }
}
function saveState() {
  if (!hasLoadedFromFirebase) {
    // Refuse to save until we've genuinely received the real data at least once.
    // Prevents the empty-initial-state-overwrites-everything bug.
    return;
  }
  setSyncStatus("pending");
  set(stateRef, state).then(() => setSyncStatus("ok")).catch((e) => {
    console.error("Firebase save error", e);
    setSyncStatus("err");
  });
}
function toggle(key) {
  state[key] = !state[key];
  render();
  saveState();
}
function setCustomText(key, value) {
  state[key] = value;
  saveState();
}

// Toggling a subject milestone needs special handling: after the toggle, check
// whether this completed the subject and advanced to a new one — if so, show
// the full-screen transition popup before the next render. Also records the date
// a milestone was checked (or clears it on uncheck) for the day-gating logic in
// todaysMilestone() — this is what makes "next hour only appears tomorrow" work.
function toggleMilestone(key) {
  const prevIndex = getCurrentSubjectIndex();
  state[key] = !state[key];
  if (state[key]) {
    state[`${key}_checkedOn`] = todayKey();
  } else {
    delete state[`${key}_checkedOn`];
  }
  const newIndex = getCurrentSubjectIndex();
  if (newIndex > prevIndex) {
    // Subject just completed, advanced to a new one.
    ensureSubjectStarted(SUBJECTS[newIndex]);
    transitionPopup = { subject: SUBJECTS[newIndex] };
  }
  render();
  saveState();
}

onValue(stateRef, (snapshot) => {
  const remote = snapshot.val();
  if (remote) state = remote;
  hasLoadedFromFirebase = true; // real data has now genuinely arrived — saves are safe from here on
  setSyncStatus("ok");
  if (!window.__initialSubjectStartSet) {
    ensureSubjectStarted(SUBJECTS[getCurrentSubjectIndex()]);
    window.__initialSubjectStartSet = true;
  }
  render();
}, (error) => {
  console.error("Firebase read error", error);
  setSyncStatus("err");
  render();
});

function dailyIdsFor(dk, subject, nextMilestone) {
  const ids = [
    "d_hydrate", "d_glance", "d_stretch", "d_eat1", "d_brush", "d_makebed",
    "d_breathing", "d_affirmation", "d_visualization",
    "d_eggs", "d_hydrate2", "d_lunch", "d_break",
    "d_custom",
    "d_h_chess", "d_h_jp", "d_h_box", "d_h_yt",
    "n_brush", "n_breathing", "n_affirmation", "n_visualization",
    "d_tomorrow", "d_screens", "d_lights",
  ];
  const day = parseInt(dk.split("-")[2], 10);
  if (day % 2 === 0) ids.push("d_bath");
  const result = ids.map(s => `${dk}_${s}`);
  // The current milestone id is subject-scoped, not date-scoped — add separately.
  if (nextMilestone) result.push(nextMilestone.id);
  return result;
}

function progressForDate(dk, subject) {
  // Historical per-day progress is approximate now, since the main-work milestone
  // is shared across the whole subject rather than being date-scoped. We show the
  // date-scoped items only for history purposes.
  const day = parseInt(dk.split("-")[2], 10);
  const ids = [
    "d_hydrate", "d_glance", "d_stretch", "d_eat1", "d_brush", "d_makebed",
    "d_breathing", "d_affirmation", "d_visualization",
    "d_eggs", "d_hydrate2", "d_lunch", "d_break",
    "d_h_chess", "d_h_jp", "d_h_box", "d_h_yt",
    "n_brush", "n_breathing", "n_affirmation", "n_visualization",
    "d_tomorrow", "d_screens", "d_lights",
  ];
  if (day % 2 === 0) ids.push("d_bath");
  const fullIds = ids.map(s => `${dk}_${s}`);
  const done = fullIds.filter(id => state[id]).length;
  return { done, total: fullIds.length, pct: Math.round((done / fullIds.length) * 100) };
}

      <div class="subject-header-icon">${subject.icon}</div>
      <div class="subject-header-title">${subject.title}</div>
      <div class="subject-header-group">${subject.group}</div>
      <div class="subject-header-days">${daysElapsed} / ${subject.budgetDays ?? "∞"} days</div>
    </div>`;
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${subject.color}"></div></div>`;
  html += `<div class="focus-line">${subject.blurb}</div>`;

  let milestonesHtml = "";
  subject.milestones.forEach(m => {
    milestonesHtml += rowHtml(m.id, m.label, null, !!state[m.id], { bold: true, color: subject.color });
  });
  html += cardHtml("subject-milestones", ICONS.target, "Milestones", `${done}/${total} done`, subject.color, milestonesHtml, collapsedCards["subject-milestones"]);

  if (subject.project) {
    const projectDone = !!state[subject.project.id];
    html += cardHtml("subject-project", "🛠️", "Project Checkpoint", projectDone ? "Done" : "Required to finish this subject", subject.color, `
      ${rowHtml(subject.project.id, "Project checkpoint", subject.project.text, projectDone, { bold: true, color: subject.color })}
    `, collapsedCards["subject-project"]);
  }

  html += `<div class="bottom-notes"><p><strong>Why it matters:</strong> ${subject.why}</p></div>`;

  return html;
}

// ============================================================
// YEARLY VIEW
// ============================================================
function renderYearly() {
  const completedCount = SUBJECTS.filter(s => isSubjectComplete(s)).length;
  const pct = Math.round((completedCount / SUBJECTS.length) * 100);

  let html = `<div class="focus-line">The big picture — ${completedCount}/${SUBJECTS.length} subjects complete</div>`;
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:#1F3A5F"></div></div>`;

  SUBJECT_GROUPS.forEach(group => {
    const groupSubjects = SUBJECTS.filter(s => s.group === group);
    const groupDone = groupSubjects.filter(s => isSubjectComplete(s)).length;
    let rowsHtml = "";
    groupSubjects.forEach(s => {
      const { done, total } = subjectProgress(s);
      rowsHtml += rowHtml(`y_${s.id}_summary`, s.title, `${done}/${total} milestones · ${s.budgetDays ? s.budgetDays + " days" : "ongoing"}`, isSubjectComplete(s), { color: AREA_COLORS[group] });
    });
    html += cardHtml(`area-${group}`, ICONS.target, group, `${groupDone}/${groupSubjects.length} done`, AREA_COLORS[group], rowsHtml, collapsedCards[`area-${group}`]);
  });

  const personalGoals = YEARLY_GOALS.filter(g => !g.subjectId);
  if (personalGoals.length) {
    let rowsHtml = "";
    personalGoals.forEach(g => {
      rowsHtml += rowHtml(g.id, g.text, g.window, !!state[g.id], { color: AREA_COLORS[g.area] || "#3C8C6B" });
    });
    html += cardHtml("area-personal-ongoing", ICONS.moon, "Ongoing Personal Goals", null, "#3C8C6B", rowsHtml, collapsedCards["area-personal-ongoing"]);
  }

  html += `<div class="bottom-notes">
    <p>Chess, Japanese, and boxing are ongoing habits — the win is consistency, not a finish line.</p>
    <p>Subjects run sequentially, one at a time — finish one, the next begins automatically.</p>
  </div>`;

  return html;
}

// ============================================================
// ROADMAP
// ============================================================
function renderRoadmap() {
  const switcherHtml = `
    <div class="roadmap-switcher">
      <button class="roadmap-switch-btn ${roadmapView === "timeline" ? "active" : ""}" data-roadmap-view="timeline">📅 Timeline</button>
      <button class="roadmap-switch-btn ${roadmapView === "pathways" ? "active" : ""}" data-roadmap-view="pathways">🧭 Pathways</button>
    </div>`;
  if (roadmapView === "pathways") return switcherHtml + renderPathways();
  return switcherHtml + renderRoadmapTimeline();
}

function renderRoadmapTimeline() {
  const currentIdx = getCurrentSubjectIndex();
  const currentSubject = SUBJECTS[currentIdx];
  const daysElapsed = daysElapsedForSubject(currentSubject);

  let spotlightHtml = `
    <div class="roadmap-spotlight">
      <div class="spotlight-label">🎯 Right now</div>
      <div class="spotlight-month">${currentSubject.icon} ${currentSubject.title}</div>
      <div class="spotlight-focus">${currentSubject.blurb}</div>
      <div class="spotlight-days">${daysElapsed} / ${currentSubject.budgetDays ?? "∞"} days</div>
    </div>`;

  let timelineHtml = "";
  SUBJECT_GROUPS.forEach(group => {
    const groupSubjects = SUBJECTS.filter(s => s.group === group);
    timelineHtml += `<div class="roadmap-group-header">${group}</div>`;
    groupSubjects.forEach((subject) => {
      const idx = SUBJECTS.indexOf(subject);
      const complete = isSubjectComplete(subject);
      const isCurrent = idx === currentIdx;
      const isExpanded = roadmapExpandedSubjectId === subject.id;
      const { done, total } = subjectProgress(subject);

      let nodeClass = "roadmap-node";
      if (complete) nodeClass += " complete";
      else if (isCurrent) nodeClass += " current";
      else nodeClass += " upcoming";

      timelineHtml += `
        <div class="roadmap-row">
          <div class="roadmap-line ${idx === 0 ? "first" : ""} ${idx === SUBJECTS.length - 1 ? "last" : ""}">
            <div class="${nodeClass}" style="background:${subject.color}">${complete ? "✓" : subject.icon}</div>
          </div>
          <button class="roadmap-card" data-roadmap-subject="${subject.id}">
            <div class="roadmap-card-top">
              <div>
                <div class="roadmap-card-title">${subject.title}</div>
                <div class="roadmap-card-sub">${done}/${total} milestones ${subject.budgetDays ? `· ${subject.budgetDays} days` : "· ongoing"} ${isCurrent ? "· active now" : complete ? "· complete" : "· upcoming"}</div>
              </div>
              <span class="chevron">${isExpanded ? "▾" : "▸"}</span>
            </div>
            ${!isExpanded ? `<div class="progress-bar" style="margin:8px 0 0;"><div class="progress-fill" style="width:${total ? Math.round((done/total)*100) : 0}%;background:${subject.color}"></div></div>` : ""}
          </button>
          ${isExpanded ? renderRoadmapSubjectDetail(subject) : ""}
        </div>`;
    });
  });

  return spotlightHtml + timelineHtml;
}

function renderRoadmapSubjectDetail(subject) {
  let milestonesHtml = "";
  subject.milestones.forEach(m => {
    milestonesHtml += `
      <div class="roadmap-week">
        <div class="roadmap-week-title">${m.label} ${state[m.id] ? "✓" : ""}</div>
      </div>`;
  });
  return `<div class="roadmap-detail">${milestonesHtml}
    <button class="roadmap-jump-btn" data-jump-subject="${subject.id}">Open ${subject.title} →</button>
  </div>`;
}

// ---------------- Pathways (unchanged — timeless, subject-based reference) ----------------
function pathwayStageProgress(stage) {
  const done = stage.items.filter(i => state[i.id]).length;
  return { done, total: stage.items.length };
}
function pathwayProgress(pathway) {
  const allItems = pathway.stages.flatMap(s => s.items);
  const done = allItems.filter(i => state[i.id]).length;
  return { done, total: allItems.length };
}
function renderPathways() {
  if (!activePathwayId) {
    let cards = PATHWAYS.map(p => {
      const { done, total } = pathwayProgress(p);
      const pct = total ? Math.round((done / total) * 100) : 0;
      return `
        <button class="pathway-pick-card" data-pick-pathway="${p.id}">
          <div class="pathway-pick-top">
            <span class="pathway-pick-icon" style="background:${p.color}">${p.icon}</span>
            <div>
              <div class="pathway-pick-title">${p.title}</div>
              <div class="pathway-pick-sub">${total ? `${done}/${total} items` : "Not built yet"}</div>
            </div>
          </div>
          <div class="pathway-pick-blurb">${p.blurb}</div>
          ${total ? `<div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" style="width:${pct}%;background:${p.color}"></div></div>` : ""}
        </button>`;
    }).join("");
    return `<div class="pathway-intro">Pick a pathway — these track topic progress, not schedule.</div>
      <div class="pathway-pick-list">${cards}</div>`;
  }
  const pathway = PATHWAYS.find(p => p.id === activePathwayId);
  if (!pathway.stages.length) {
    return `<button class="history-back" id="pathway-back-btn">← Back to pathways</button>
      <div class="locked-message">
        <div class="locked-icon">${pathway.icon}</div>
        <div class="locked-title">${pathway.title} — coming soon</div>
        <div class="locked-sub">${pathway.blurb}</div>
      </div>`;
  }
  const { done, total } = pathwayProgress(pathway);
  const pct = Math.round((done / total) * 100);
  let html = `<button class="history-back" id="pathway-back-btn">← Back to pathways</button>`;
  html += `<div class="focus-line">${pathway.icon} ${pathway.title} — ${done}/${total} items</div>`;
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pathway.color}"></div></div>`;
  pathway.stages.forEach((stage, idx) => {
    const { done: sDone, total: sTotal } = pathwayStageProgress(stage);
    const stageComplete = sDone === sTotal;
    let itemsHtml = `<div class="note-italic">${stage.note}</div>`;
    stage.items.forEach(item => {
      itemsHtml += rowHtml(item.id, item.text, null, !!state[item.id], { color: pathway.color });
    });
    html += cardHtml(`pathway-${stage.id}`, stageComplete ? "✓" : `${idx + 1}`, stage.title, `${sDone}/${sTotal} done`, stageComplete ? "#3C8C6B" : pathway.color, itemsHtml, collapsedCards[`pathway-${stage.id}`]);
  });
  return html;
}

// ============================================================
// CALENDAR / HISTORY — fully read-only for every past day now
// ============================================================
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["S","M","T","W","T","F","S"];

function renderCalendarOverlay() {
  const subject = SUBJECTS[getCurrentSubjectIndex()];
  const year = calendarViewDate.getFullYear();
  const cmonth = calendarViewDate.getMonth();
  const firstDay = new Date(year, cmonth, 1).getDay();
  const daysInMonth = new Date(year, cmonth + 1, 0).getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === year && today.getMonth() === cmonth;

  let cells = "";
  for (let i = 0; i < firstDay; i++) cells += `<div class="cal-day empty"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const dk = dateKeyFor(year, cmonth, day);
    const { done, total } = progressForDate(dk, subject);
    const isToday = isCurrentMonth && today.getDate() === day;
    const isFuture = new Date(year, cmonth, day) > today;
    let dotColor = "";
    if (!isFuture && done > 0) dotColor = done === total ? "#3C8C6B" : "#E0C04C";
    cells += `
      <div class="cal-day ${isToday ? "today" : ""} ${done > 0 ? "has-data" : ""}" ${isFuture ? "" : `data-history-date="${dk}"`} style="${isFuture ? "opacity:0.35;cursor:default;" : ""}">
        ${day}${dotColor ? `<span class="dot" style="background:${dotColor}"></span>` : ""}
      </div>`;
  }
  const dowHtml = DOW.map(d => `<div class="cal-dow">${d}</div>`).join("");
  return `
    <div class="calendar-overlay" id="calendar-overlay">
      <div class="calendar-sheet">
        <div class="calendar-header">
          <div class="calendar-nav"><button id="cal-prev">‹</button><button id="cal-next">›</button></div>
          <h2>${MONTH_NAMES[cmonth]} ${year}</h2>
          <button class="calendar-close" id="cal-close">✕</button>
        </div>
        <div class="calendar-grid">${dowHtml}${cells}</div>
        <div class="cal-legend">
          <span><span class="legend-dot" style="background:#3C8C6B"></span> Full day</span>
          <span><span class="legend-dot" style="background:#E0C04C"></span> Partial</span>
          <span><span class="legend-dot" style="background:#D8D2C4"></span> No activity</span>
        </div>
      </div>
    </div>`;
}

function renderHistoryDay() {
  const dk = historyDate.key;
  const dateObj = new Date(historyDate.year, historyDate.month, historyDate.day);
  const dateStr = dateObj.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  const day = historyDate.day;
  const isEvenDay = day % 2 === 0;
  const historicalExercise = exerciseForDate(dateObj);
  const { done, total, pct } = progressForDate(dk, SUBJECTS[getCurrentSubjectIndex()]);
  const customText = state[`${dk}_d_custom_text`] || "";
  const customChecked = !!state[`${dk}_d_custom`];

  let html = `
    <div class="history-day-view">
      <button class="history-back" id="history-back-btn">← Back to today</button>
      <div class="history-date-title">${dateStr}</div>
      <div class="history-sub">${done} / ${total} completed that day</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:#1F3A5F"></div></div>`;

  html += cardHtml("h-morning", ICONS.sunrise, "Early Morning", null, "#3B6FA0", `
    ${readonlyRowHtml("Hydrate — glass of water right away", null, !!state[`${dk}_d_hydrate`])}
    ${readonlyRowHtml("Quick glance at today's plan", null, !!state[`${dk}_d_glance`])}
    ${readonlyRowHtml("Light stretch or movement", null, !!state[`${dk}_d_stretch`])}
    ${readonlyRowHtml("Eat something before heading out", null, !!state[`${dk}_d_eat1`])}
    ${readonlyRowHtml("Brush", null, !!state[`${dk}_d_brush`])}
    ${readonlyRowHtml("Make bed", null, !!state[`${dk}_d_makebed`])}
    ${isEvenDay ? readonlyRowHtml("Bath / cleanup", "even days only", !!state[`${dk}_d_bath`]) : ""}
    ${readonlyRowHtml("Deep breathing", null, !!state[`${dk}_d_breathing`])}
    ${readonlyRowHtml("Affirmations", null, !!state[`${dk}_d_affirmation`])}
    ${readonlyRowHtml("Visualization", null, !!state[`${dk}_d_visualization`])}
  `, false);

  html += cardHtml("h-midday", ICONS.sun, "During the Day", null, "#C6601E", `
    ${readonlyRowHtml("Eat two eggs", null, !!state[`${dk}_d_eggs`])}
    ${readonlyRowHtml("Hydrate (midday top-up)", null, !!state[`${dk}_d_hydrate2`])}
    ${readonlyRowHtml("Eat lunch properly, away from screens", null, !!state[`${dk}_d_lunch`])}
    ${readonlyRowHtml("One short break outside or away from screens", null, !!state[`${dk}_d_break`])}
  `, false);

  if (customText) {
    html += cardHtml("h-custom", ICONS.target, "That day's open task", null, "#1F3A5F", `
      ${readonlyRowHtml(customText, "Open slot task", customChecked, { bold: true, color: "#1F3A5F" })}
    `, false);
  }

  html += cardHtml("h-habits", ICONS.moon, "Ongoing Habits", null, "#3C8C6B", `
    ${readonlyRowHtml("Chess", "a game or a review", !!state[`${dk}_d_h_chess`], { color: "#3C8C6B" })}
    ${readonlyRowHtml("Japanese", "10–15 min", !!state[`${dk}_d_h_jp`], { color: "#3C8C6B" })}
    ${readonlyRowHtml(historicalExercise.label, historicalExercise.detail, !!state[`${dk}_d_h_box`], { color: "#3C8C6B" })}
    ${readonlyRowHtml("YouTube video upload", "no fixed schedule", !!state[`${dk}_d_h_yt`], { color: "#3C8C6B" })}
  `, false);

  html += cardHtml("h-night", ICONS.moon, "Night", null, "#7A5195", `
    ${readonlyRowHtml("Write tomorrow's top priority before stopping work", null, !!state[`${dk}_d_tomorrow`])}
    ${readonlyRowHtml("Screens off 20–30 min before bed", null, !!state[`${dk}_d_screens`])}
    ${readonlyRowHtml("Lights out by 10–11pm", null, !!state[`${dk}_d_lights`])}
    ${readonlyRowHtml("Brush", null, !!state[`${dk}_n_brush`])}
    ${readonlyRowHtml("Deep breathing", null, !!state[`${dk}_n_breathing`])}
    ${readonlyRowHtml("Affirmations", null, !!state[`${dk}_n_affirmation`])}
    ${readonlyRowHtml("Visualization", null, !!state[`${dk}_n_visualization`])}
  `, false);

  html += `<div class="readonly-note">This is a read-only look back — past days can't be edited.</div></div>`;
  return html;
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  const TABS = [
    { id: "daily", label: "Daily", icon: "☀️" },
    { id: "subject", label: "Subject", icon: "📘" },
    { id: "yearly", label: "Yearly", icon: "🎯" },
    { id: "roadmap", label: "Roadmap", icon: "🧭" },
  ];

  let tabsHtml = TABS.map(t => `
    <button class="tab-btn ${tab === t.id ? "active" : ""}" data-tab="${t.id}">${t.icon} ${t.label}</button>
  `).join("");

  let contentHtml = "";
  const reviewBatch = pendingReviewBatch();
  if (reviewBatch && (tab === "daily" || tab === "subject")) {
    contentHtml = renderPeriodicReview(reviewBatch);
  } else if (tab === "daily") contentHtml = historyDate ? renderHistoryDay() : renderDaily();
  else if (tab === "subject") contentHtml = renderSubject();
  else if (tab === "yearly") contentHtml = renderYearly();
  else if (tab === "roadmap") contentHtml = renderRoadmap();

  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <div class="eyebrow">Sequential goal system</div>
      <h1>My Goal System</h1>
      <p>Daily → Subject → Yearly</p>
      <div class="sync-status ${syncStatus}" id="sync-status">${syncStatus === "ok" ? "Synced" : syncStatus === "err" ? "Sync error — check connection" : "Syncing…"}</div>
    </div>
    <div class="tabs">${tabsHtml}</div>
    <div class="content">${contentHtml}</div>
    <div class="footer-note">Changes sync automatically across your devices</div>
    ${calendarOpen ? renderCalendarOverlay() : ""}
    ${renderTransitionPopup()}
  `;
  attachListeners();
}

function attachListeners() {
  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.preventDefault();
      const key = el.getAttribute("data-toggle");
      const isMilestone = SUBJECTS.some(s => s.milestones.some(m => m.id === key) || (s.project && s.project.id === key));
      const reviewMatch = /^review_task_batch_(\d+)$/.exec(key);
      if (reviewMatch) {
        state[key] = !state[key];
        if (state[key]) state[`review_done_batch_${reviewMatch[1]}`] = true;
        else delete state[`review_done_batch_${reviewMatch[1]}`];
        render();
        saveState();
      } else if (isMilestone) {
        toggleMilestone(key);
      } else {
        toggle(key);
      }
    });
  });
  document.querySelectorAll("[data-cardtoggle]").forEach(el => {
    el.addEventListener("click", () => {
      const key = el.getAttribute("data-cardtoggle");
      collapsedCards[key] = !collapsedCards[key];
      render();
    });
  });
  document.querySelectorAll("[data-tab]").forEach(el => {
    el.addEventListener("click", () => { tab = el.getAttribute("data-tab"); historyDate = null; render(); });
  });
  document.querySelectorAll("[data-roadmap-view]").forEach(el => {
    el.addEventListener("click", () => { roadmapView = el.getAttribute("data-roadmap-view"); render(); });
  });
  document.querySelectorAll("[data-roadmap-subject]").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.getAttribute("data-roadmap-subject");
      roadmapExpandedSubjectId = roadmapExpandedSubjectId === id ? null : id;
      render();
    });
  });
  document.querySelectorAll("[data-jump-subject]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      tab = "subject";
      render();
    });
  });
  document.querySelectorAll("[data-pick-pathway]").forEach(el => {
    el.addEventListener("click", () => { activePathwayId = el.getAttribute("data-pick-pathway"); render(); });
  });
  const pathwayBackBtn = document.getElementById("pathway-back-btn");
  if (pathwayBackBtn) pathwayBackBtn.addEventListener("click", () => { activePathwayId = null; render(); });

  const resetBtn = document.getElementById("reset-day-btn");
  if (resetBtn) {
    resetBtn.addEventListener("click", () => {
      const subject = SUBJECTS[getCurrentSubjectIndex()];
      const ids = dailyIdsFor(dKey, subject, null); // don't clear the milestone itself on reset
      ids.forEach(id => delete state[id]);
      delete state[`${dKey}_d_custom_text`];
      render();
      saveState();
    });
  }
  const customInput = document.getElementById("custom-task-input");
  if (customInput) customInput.addEventListener("input", (e) => setCustomText(`${dKey}_d_custom_text`, e.target.value));

  const openCalBtn = document.getElementById("open-calendar-btn");
  if (openCalBtn) openCalBtn.addEventListener("click", () => { calendarViewDate = new Date(); calendarOpen = true; render(); });
  const calClose = document.getElementById("cal-close");
  if (calClose) calClose.addEventListener("click", () => { calendarOpen = false; render(); });
  const calOverlay = document.getElementById("calendar-overlay");
  if (calOverlay) calOverlay.addEventListener("click", (e) => { if (e.target.id === "calendar-overlay") { calendarOpen = false; render(); } });
  const calPrev = document.getElementById("cal-prev");
  if (calPrev) calPrev.addEventListener("click", () => { calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth() - 1, 1); render(); });
  const calNext = document.getElementById("cal-next");
  if (calNext) calNext.addEventListener("click", () => { calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth() + 1, 1); render(); });
  document.querySelectorAll("[data-history-date]").forEach(el => {
    el.addEventListener("click", () => {
      const dk = el.getAttribute("data-history-date");
      const [y, m, d] = dk.split("-").map(Number);
      historyDate = (dk === dKey) ? null : { year: y, month: m - 1, day: d, key: dk };
      calendarOpen = false;
      render();
    });
  });
  const historyBackBtn = document.getElementById("history-back-btn");
  if (historyBackBtn) historyBackBtn.addEventListener("click", () => { historyDate = null; render(); });

  const transitionContinueBtn = document.getElementById("transition-continue-btn");
  if (transitionContinueBtn) transitionContinueBtn.addEventListener("click", () => { transitionPopup = null; render(); });
}

// Initial render while waiting for Firebase
render();

</script>
